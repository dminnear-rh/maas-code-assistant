apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: maas.{{ .Values.global.wildcardDomain | trimPrefix "apps." }}
      allowedRoutes:
        namespaces:
          from: All
