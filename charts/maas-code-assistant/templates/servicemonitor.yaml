apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: limitador-metrics
  namespace: kuadrant-system
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: limitador
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
