apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: maas-dashboard
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
spec:
  instanceSelector:
    matchLabels:
      {{- if .Values.grafana.selectors }}
      {{- toYaml .Values.grafana.selectors | nindent 6 }}
      {{- else }}
      {{- include  "maas-code-assistant.selectorLabels" . | nindent 6 }}
      {{- end }}
  json: |-
    {{- .Files.Get "files/dashboard.json" | nindent 4 }}
